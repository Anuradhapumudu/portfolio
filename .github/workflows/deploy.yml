name: Deploy Portfolio to GitHub Pages

on:
  # Runs on every push to the main branch
  push:
    branches: [main]

  # Allows manual trigger from the GitHub Actions tab
  workflow_dispatch:

# Sets permissions so GitHub Actions can deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time, cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── Build ──────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          # If you use reCAPTCHA, add VITE_RECAPTCHA_SITE_KEY
          # as a GitHub secret (Settings → Secrets → Actions)
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ── Deploy ─────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
